kind = "web"
previewPath = "/"
title = "Dystopia — Policy Simulation Platform"
version = "1.0.0"
id = "artifacts/dystopia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25063

[services.development]
run = "pnpm --filter @workspace/dystopia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dystopia", "run", "build" ]
publicDir = "artifacts/dystopia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25063"
BASE_PATH = "/"
